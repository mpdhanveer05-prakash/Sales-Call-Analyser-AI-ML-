services:

  # ================================================================
  # INFRASTRUCTURE SERVICES
  # Start with: docker compose up -d
  # These run without any app code built.
  # ================================================================

  postgres:
    image: pgvector/pgvector:pg16
    container_name: sca-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sales_call_analyzer}
      POSTGRES_USER: ${POSTGRES_USER:-sca_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sca_user} -d ${POSTGRES_DB:-sales_call_analyzer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sca-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: sca-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_minio_password}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: sca-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  languagetool:
    image: silviof/docker-languagetool:latest
    container_name: sca-languagetool
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8010/v2/languages > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: sca-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # --- GPU Support (uncomment when running on a machine with NVIDIA GPU) ---
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped

  # ================================================================
  # APPLICATION SERVICES
  # Only available after Phase 1.3+ code is built.
  # Start with: docker compose --profile app up -d
  # ================================================================

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sca-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - app

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sca-celery-worker
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - app

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: sca-ml-service
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      # MinIO connection (Docker network — use service name not localhost)
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "false"
      # Whisper model settings — change to large-v3 once GPU is confirmed
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-base}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      MODEL_CACHE_DIR: /app/model_cache
      # Optional: set HUGGINGFACE_TOKEN in .env to enable Pyannote diarization
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN:-}
      # LanguageTool — used by speech analysis for grammar scoring
      LANGUAGETOOL_URL: http://languagetool:8010
    volumes:
      - ml_models:/app/model_cache
    depends_on:
      minio:
        condition: service_healthy
      languagetool:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sca-frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - app

volumes:
  postgres_data:
  redis_data:
  minio_data:
  opensearch_data:
  ollama_data:
  ml_models:      # Whisper model cache — avoids re-download on container restart

networks:
  default:
    name: sca-network

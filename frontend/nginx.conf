server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS — re-resolve upstream hostnames every 10s instead
    # of caching them forever at startup. Without this, restarting the backend
    # container leaves nginx pointing at the old (now-dead) IP → 502 errors.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Using a variable in proxy_pass forces nginx to use the resolver
        # above on every request instead of resolving once at config load.
        set $backend_upstream "http://backend:3000";
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 600m;
    }

    location /health {
        set $backend_health "http://backend:3000";
        proxy_pass $backend_health;
    }
}

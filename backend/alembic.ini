[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Overridden in alembic/env.py — reads from .env via app.config
sqlalchemy.url = postgresql+psycopg2://sca_user:changeme@localhost:5432/sales_call_analyzer

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
